name: "🐛 Bug"
description: Report an issue to help improve CardVault.
title: "[BUG] <description>"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what happened, what you expected, and steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots/screen recordings if relevant.
    validations:
      required: false
